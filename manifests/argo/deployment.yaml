# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ilrs-deployment
  labels:
    app: ilrs-deployment
spec:
  selector:
    matchLabels:
      app: ilrs-deployment
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container:  ilrs-deployment
      labels:
        app: ilrs-deployment
    spec:
      containers:
      - name: ilrs-deployment
        image: neeythann/ip-location-rs:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            memory: 100Mi
        ports:
        - containerPort: 80
          name: ilrs-http-port
        readinessProbe:
          httpGet:
            path: /ip/1.1.1.1
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ip/1.1.1.1
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
---

